<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門監控 - 實時修復版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; font-size: clamp(16px, 1.2vw + 12px, 24px); overflow: hidden; }
        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px 15px 5px; flex-shrink: 0; }
        
        /* 手動刷新按鈕樣式 */
        .refresh-btn {
            background: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-right: auto; /* 靠左對齊 */
            margin-left: 20px;
        }
        .refresh-btn:hover { background: #30363d; border-color: #8b949e; }
        .refresh-btn:active { transform: scale(0.95); }
        .fa-spin-once { animation: spin 0.8s ease-in-out; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #actual-mini { display: flex; gap: 15px; background: rgba(88, 166, 255, 0.12); padding: 8px 20px; border-radius: 40px; border: 1px solid rgba(88, 166, 255, 0.3); font-size: 1.1rem; align-items: center; }
        #actual-mini img { height: 45px; width: auto; }
        .marquee-container { border: 1px solid #30363d; margin-bottom: 10px; height: 50px; overflow: hidden; display: flex; align-items: center; background: #1c232d; flex-shrink: 0; }
        .marquee-label { color: #0d1117; padding: 0 15px; font-weight: bold; font-size: 0.9rem; min-width: 110px; height: 100%; display: flex; align-items: center; }
        .marquee-stage { flex-grow: 1; height: 100%; position: relative; }
        .marquee-text { position: absolute; width: 100%; padding: 0 15px; font-size: 1rem; line-height: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.6s; }
        .traffic-bar .marquee-label { background: #f2c94c; }
        .news-bar .marquee-label { background: #d73a49; color: #fff; }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; border-top: 4px solid #30363d; }
        .card-forecast { border-top-color: #79c0ff; }
        .card-warning { border-top-color: #f8e3a1; }
        .card-seven { border-top-color: #7ee787; }
        .content { font-size: 0.95rem; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; flex-grow: 1; color: #d1d5db; }
        .time { font-size: 0.8rem; color: #8b949e; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

<header style="display: flex; align-items: center; gap: 15px;">
    <h1 id="status-title" style="margin: 0;">澳門資訊監控</h1>
    
    <button class="refresh-btn" onclick="manualRefresh()" style="flex-shrink: 0;">
        <i id="refresh-icon" class="fa-solid fa-arrows-rotate"></i> 
        <span style="font-size: 0.8rem;">手動刷新</span>
    </button>

    <div id="actual-mini" style="margin-left: auto;">讀取中...</div>
</header>

    <div class="marquee-container traffic-bar">
        <div class="marquee-label">交通消息</div>
        <div class="marquee-stage"><div id="traffic-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div class="marquee-container news-bar">
        <div class="marquee-label">澳廣視新聞</div>
        <div class="marquee-stage"><div id="news-marquee" class="marquee-text">同步中...</div></div>
    </div>

    <div class="grid">
        <div class="card card-forecast" id="forecast-box"></div>
        <div class="card card-warning" id="warning-box"></div>
        <div class="card card-seven" id="seven-box"></div>
    </div>

<script>
    const feeds = [
        { id: "actual", url: "https://rss.smg.gov.mo/c_ActualWeather_rss.xml" },
        { id: "forecast", name: "天氣預測", url: "https://rss.smg.gov.mo/c_WForecast_rss.xml", icon: "fa-cloud-sun" },
        { id: "warning", name: "天氣警告", url: "https://rss.smg.gov.mo/c_WSignal_rss.xml", icon: "fa-triangle-exclamation" },
        { id: "seven", name: "七日預測", url: "https://rss.smg.gov.mo/c_WForecast7days_rss.xml", icon: "fa-calendar-week" },
        { id: "traffic", url: "https://dis.dsat.gov.mo:8017/traffic/xml/pn_rss.htm?language=tc" },
        { id: "news", url: "https://cdn2.tdm.com.mo/xml/rss/zh_news.xml" }
    ];

    let trafficDataList = [], newsDataList = [];

    // 手動刷新函數
    async function manualRefresh() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('fa-spin-once'); // 增加旋轉動畫
        
        await load(); // 執行原本的加載邏輯
        
        // 動畫結束後移除 class 以便下次觸發
        setTimeout(() => icon.classList.remove('fa-spin-once'), 800);
    }

    function processContent(id, text) {
        let clean = text.replace(/<[^>]*>/g, '').trim();
        clean = clean.replace(/(警告類型|最近更新時間|內容)\s*(：|:)?/g, "").trim();
        if (id === "warning") {
            const result = clean.replace(/沒有(熱帶氣旋|暴雨|季候風|雷暴|風暴潮|海嘯).*\n?/g, "").trim();
            return result === "" ? "現時沒有天氣警告" : result;
        }
        if (id === "seven") return clean.replace(/(\d{4}-\d{2}-\d{2})/g, "\n\n$1\n").trim();
        return clean;
    }

    async function load() {
        const myGasUrl = "https://script.google.com/macros/s/AKfycbzgQYauGB2igGh44n3AcgA4ZzHkrkPL0yDAZuRtcNb-ikgwAtuZeCsGQz2h2J42l-dB/exec"; 
        const now = new Date().toLocaleTimeString();
        document.getElementById('status-title').innerText = "Google 專線同步中...";

        for (const f of feeds) {
            try {
                const finalApi = `${myGasUrl}?url=${encodeURIComponent(f.url)}&_rand=${Date.now()}`;
                const res = await fetch(finalApi, { cache: "no-store" });
                const xmlText = await res.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const item = xmlDoc.querySelector("item");

                if (!item) continue;

                if (f.id === "actual") {
                    const desc = item.querySelector("description").textContent;
                    const icon = desc.match(/ww-[a-zA-Z0-9]+\.gif/);
                    const img = icon ? `<img src="https://www.smg.gov.mo/icons/weatherIcon/${icon[0]}?v=${Date.now()}">` : "";
                    document.getElementById('actual-mini').innerHTML = `<span>實時天氣</span> ${img}`;
                } else if (f.id === "traffic") {
                    trafficDataList = Array.from(xmlDoc.querySelectorAll("item")).map(i => ({
                        title: i.querySelector("title").textContent,
                        date: (i.querySelector("pubDate")?.textContent || "").split(' ')[4] || ""
                    }));
                } else if (f.id === "news") {
                    newsDataList = Array.from(xmlDoc.querySelectorAll("item")).map(i => ({
                        title: i.querySelector("title").textContent
                    }));
                } else {
                    const box = document.getElementById(`${f.id}-box`);
                    const content = processContent(f.id, item.querySelector("description").textContent);
                    const pubDate = item.querySelector("pubDate")?.textContent || "";
                    
                    box.innerHTML = `
                        <div class="card-header"><h2><i class="fa-solid ${f.icon}"></i> ${f.name}</h2></div>
                        <div class="content">${content}</div>
                        <div class="time">
                            🕒 數據發布: ${pubDate}<br>
                            <span style="color:#58a6ff">🚀 Google 專線更新於: ${now}</span>
                        </div>
                    `;
                    (f.id === "warning" && content !== "現時沒有天氣警告") ? box.classList.add("alert-active") : box.classList.remove("alert-active");
                }
            } catch (e) { 
                console.error(`[${f.id}] GAS 請求失敗:`, e); 
            }
        }
        document.getElementById('status-title').innerText = "澳門資訊監控";
    }

    function rotate(list, elId, obj) {
        if (!list.length) return;
        const el = document.getElementById(elId);
        el.style.opacity = "0";
        setTimeout(() => {
            obj.i = (obj.i + 1) % list.length;
            el.innerText = elId.includes('news') ? list[obj.i].title : `${list[obj.i].title} ${list[obj.i].date}`;
            el.style.opacity = "1";
        }, 600);
    }

    window.onload = () => {
        load();
        setInterval(load, 60000);
        const tc = {i:0}, nc = {i:0};
        setInterval(() => rotate(trafficDataList, 'traffic-marquee', tc), 10000);
        setInterval(() => rotate(newsDataList, 'news-marquee', nc), 12000);
    };
</script>
</body>
</html>
